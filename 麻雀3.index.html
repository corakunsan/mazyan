<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポン・ツモ・点数！ 麻雀計算</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'M PLUS 1p', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at 50% 50%, #76d275, #2e7d32);
            color: #263238;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: #fffdf2;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }
        h1 { font-size: 1.5rem; text-align: center; margin-top: 0; color: #1a1a1a; }
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .form-group { flex: 1; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; font-weight: bold; color: #455a64; }
        select, input[type="number"] {
            width: 100%; padding: 12px; font-size: 1rem; border: 2px solid #ddd;
            border-radius: 12px; box-sizing: border-box; background-color: #fff;
            transition: border-color 0.2s;
        }
        select:focus, input[type="number"]:focus { border-color: #fdd835; outline: none; }
        
        .checkbox-toggle {
            display: flex; align-items: center; padding: 12px; background: #e3f2fd;
            border-radius: 12px; margin-bottom: 15px; font-weight: bold; color: #1565c0; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .checkbox-toggle input { margin-right: 12px; transform: scale(1.4); }
        
        .yaku-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .yaku-label {
            display: block; text-align: center; background: #fff; border: 2px solid #ddd;
            padding: 10px 5px; border-radius: 15px; font-size: 0.85rem; cursor: pointer; user-select: none; transition: 0.2s;
            box-shadow: 0 3px #ddd;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* スマホ対応修正：完全に消さずに透明にして押しつぶす */
        .yaku-label input { 
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
            pointer-events: none;
        }
        
        .yaku-label:has(input:checked) { background: #43a047; color: white; border-color: #388e3c; font-weight: bold; box-shadow: 0 3px #1b5e20; transform: translateY(1px); }
        .yaku-label:active { transform: translateY(3px); box-shadow: 0 0 transparent; }
        .yaku-label.disabled { opacity: 0.4; pointer-events: none; background: #eee; box-shadow: 0 3px #ccc; }

        .fu-calculator {
            background-color: #fffde7; border: 2px solid #ffe082; padding: 15px;
            border-radius: 15px; margin-bottom: 20px;
        }
        .fu-calculator h2 { font-size: 1rem; color: #f57f17; margin-top: 0; margin-bottom: 10px; }
        .mentsu-row { margin-bottom: 10px; }
        .fu-input { font-size: 0.9rem; }

        .result-box { padding: 15px; background-color: #e8f5e9; border: 3px solid #c0ca33; border-radius: 15px; text-align: center; }
        .rank-name { font-size: 1.3rem; font-weight: bold; color: #d32f2f; margin-bottom: 5px; }
        
        .score-wrap { position: relative; display: inline-block; margin: 10px 0; }
        .result-score { font-size: 2.5rem; font-weight: bold; color: #1b5e20; }
        .result-detail { font-size: 1.1rem; font-weight: bold; color: #555; }
        .calc-info { font-size: 0.8rem; color: #666; margin-top: 8px; font-family: monospace; white-space: pre-wrap; }
        #fuWarning { color: #d32f2f; font-size: 0.85rem; font-weight: bold; margin-bottom: 10px; display: none; }

        .sparkle {
            position: absolute; width: 15px; height: 15px; background: gold; border-radius: 50%;
            pointer-events: none; opacity: 0; z-index: 10;
        }
        @keyframes sparkle-animation {
            0% { transform: scale(0); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: scale(1.5) translate(var(--tx), var(--ty)); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ポン・ツモ・点数！ 麻雀計算</h1>

    <div class="form-row">
        <div class="form-group"><label>立場</label><select id="position"><option value="ko">子</option><option value="oya">親</option></select></div>
        <div class="form-group"><label>和了</label><select id="agari"><option value="ron">ロン</option><option value="tsumo">ツモ</option></select></div>
    </div>

    <label class="checkbox-toggle" id="nakiLabel">
        <input type="checkbox" id="isNaki"> 鳴きあり（副露）
    </label>

    <label>成立した役をタップ</label>
    <div class="yaku-grid" id="yakuContainer">
        <label class="yaku-label"><input type="checkbox" class="yaku-cb" data-menzen="1" data-naki="0">立直</label>
        <label class="yaku-label"><input type="checkbox" class="yaku-cb" data-menzen="1" data-naki="0">一発</label>
        <label class="yaku-label"><input type="checkbox" class="yaku-cb" data-menzen="1" data-naki="0" id="pinfu">平和</label>
        <label class="yaku-label"><input type="checkbox" class="yaku-cb" data-menzen="1" data-naki="1">断幺九</label>
        <label class="yaku-label"><input type="checkbox" class="yaku-cb" data-menzen="1" data-naki="1">役牌</label>
        <label class="yaku-label"><input type="checkbox" class="yaku-cb" data-menzen="1" data-naki="0">一盃口</label>
        <label class="yaku-label"><input type="checkbox" class="yaku-cb" data-menzen="2" data-naki="1">三色同順</label>
        <label class="yaku-label"><input type="checkbox" class="yaku-cb" data-menzen="2" data-naki="1">一気通貫</label>
        <label class="yaku-label"><input type="checkbox" class="yaku-cb" data-menzen="2" data-naki="2">対々和</label>
        <label class="yaku-label"><input type="checkbox" class="yaku-cb" data-menzen="2" data-naki="0" id="chiitoi">七対子</label>
        <label class="yaku-label"><input type="checkbox" class="yaku-cb" data-menzen="3" data-naki="2">混一色</label>
        <label class="yaku-label"><input type="checkbox" class="yaku-cb" data-menzen="6" data-naki="5">清一色</label>
    </div>

    <div class="form-group" style="margin-bottom: 20px;">
        <label>ドラ（赤・裏含む）</label>
        <input type="number" id="dora" value="0" min="0" max="13">
    </div>

    <div class="fu-calculator" id="fuCalcArea">
        <h2>手牌の形を選択（符計算）</h2>
        <div id="fuWarning">※平和・七対子が選択されているため、符は固定されます。</div>
        
        <div id="fuDetailsArea">
            <div class="form-row">
                <div class="form-group"><label>待ち</label><select id="machi" class="fu-input fu-change"><option value="0">両面/双碰 (0)</option><option value="2">カン/ペン/単騎 (+2)</option></select></div>
                <div class="form-group"><label>雀頭</label><select id="jantou" class="fu-input fu-change"><option value="0">数牌/客風牌 (0)</option><option value="2">役牌 (+2)</option><option value="4">連風牌 (+4)</option></select></div>
            </div>
            <label>面子（シュンツ以外）</label>
            <div class="mentsu-row"><select class="fu-input fu-change mentsu-select"><option value="0">順子/なし (0)</option><option value="2">明刻 [2〜8] (+2)</option><option value="4">明刻 [1,9,字] (+4)</option><option value="4">暗刻 [2〜8] (+4)</option><option value="8">暗刻 [1,9,字] (+8)</option><option value="8">明槓 [2〜8] (+8)</option><option value="16">明槓 [1,9,字] (+16)</option><option value="16">暗槓 [2〜8] (+16)</option><option value="32">暗槓 [1,9,字] (+32)</option></select></div>
            <div class="mentsu-row"><select class="fu-input fu-change mentsu-select"><option value="0">順子/なし (0)</option><option value="2">明刻 [2〜8] (+2)</option><option value="4">明刻 [1,9,字] (+4)</option><option value="4">暗刻 [2〜8] (+4)</option><option value="8">暗刻 [1,9,字] (+8)</option><option value="8">明槓 [2〜8] (+8)</option><option value="16">明槓 [1,9,字] (+16)</option><option value="16">暗槓 [2〜8] (+16)</option><option value="32">暗槓 [1,9,字] (+32)</option></select></div>
            <div class="mentsu-row"><select class="fu-input fu-change mentsu-select"><option value="0">順子/なし (0)</option><option value="2">明刻 [2〜8] (+2)</option><option value="4">明刻 [1,9,字] (+4)</option><option value="4">暗刻 [2〜8] (+4)</option><option value="8">暗刻 [1,9,字] (+8)</option><option value="8">明槓 [2〜8] (+8)</option><option value="16">明槓 [1,9,字] (+16)</option><option value="16">暗槓 [2〜8] (+16)</option><option value="32">暗槓 [1,9,字] (+32)</option></select></div>
            <div class="mentsu-row"><select class="fu-input fu-change mentsu-select"><option value="0">順子/なし (0)</option><option value="2">明刻 [2〜8] (+2)</option><option value="4">明刻 [1,9,字] (+4)</option><option value="4">暗刻 [2〜8] (+4)</option><option value="8">暗刻 [1,9,字] (+8)</option><option value="8">明槓 [2〜8] (+8)</option><option value="16">明槓 [1,9,字] (+16)</option><option value="16">暗槓 [2〜8] (+16)</option><option value="32">暗槓 [1,9,字] (+32)</option></select></div>
        </div>
    </div>

    <div class="result-box">
        <div class="rank-name" id="rankName"></div>
        <div class="score-wrap" id="scoreWrap">
            <div class="result-score" id="totalScore">0 点</div>
        </div>
        <div class="result-detail" id="scoreDetail">役と手牌を選択してください</div>
        <div class="calc-info" id="calcInfo"></div>
    </div>
</div>

<script>
    const scoreWrap = document.getElementById('scoreWrap');

    function createSparkles() {
        document.querySelectorAll('.sparkle').forEach(e => e.remove());
        const numParticles = 25;
        for (let i = 0; i < numParticles; i++) {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            const angle = Math.random() * Math.PI * 2;
            const distance = 40 + Math.random() * 80;
            sparkle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
            sparkle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
            sparkle.style.animationDelay = `${Math.random() * 0.2}s`;
            const size = 5 + Math.random() * 12;
            sparkle.style.width = `${size}px`;
            sparkle.style.height = `${size}px`;
            sparkle.style.left = `50%`;
            sparkle.style.top = `50%`;
            sparkle.style.marginLeft = `-${size/2}px`;
            sparkle.style.marginTop = `-${size/2}px`;
            sparkle.style.animation = 'sparkle-animation 1s ease-out forwards';
            scoreWrap.appendChild(sparkle);
            setTimeout(() => { sparkle.remove(); }, 1200);
        }
    }

    function calculateScore() {
        const isOya = document.getElementById('position').value === 'oya';
        const isTsumo = document.getElementById('agari').value === 'tsumo';
        const isNaki = document.getElementById('isNaki').checked;
        const dora = parseInt(document.getElementById('dora').value) || 0;
        const isPinfu = document.getElementById('pinfu').checked;
        const isChiitoi = document.getElementById('chiitoi').checked;

        let han = 0;
        let activeYakuCount = 0;

        document.querySelectorAll('.yaku-cb').forEach(cb => {
            const label = cb.parentElement;
            const menzenHan = parseInt(cb.dataset.menzen);
            const nakiHan = parseInt(cb.dataset.naki);

            if (isNaki && nakiHan === 0) { label.classList.add('disabled'); cb.checked = false; }
            else { label.classList.remove('disabled'); }
            if (cb.checked) { han += isNaki ? nakiHan : menzenHan; activeYakuCount++; }
        });

        let tsumoYakuText = "";
        if (isTsumo && !isNaki && activeYakuCount > 0) { han += 1; tsumoYakuText = " (+ツモ1)"; }
        if (activeYakuCount > 0) han += dora;

        let finalFu = 0;
        let fuBreakdown = "";
        const fuDetailsArea = document.getElementById('fuDetailsArea');
        const fuWarning = document.getElementById('fuWarning');
        
        if (isChiitoi || isPinfu) {
            fuDetailsArea.style.display = 'none'; fuWarning.style.display = 'block';
            if (isChiitoi) { finalFu = 25; fuBreakdown = "七対子 (25符固定)"; }
            else { finalFu = isTsumo ? 20 : 30; fuBreakdown = isTsumo ? "平和ツモ (20符固定)" : "平和ロン (30符固定)"; }
        } else {
            fuDetailsArea.style.display = 'block'; fuWarning.style.display = 'none';
            let base = 20, menzenRon = (!isTsumo && !isNaki) ? 10 : 0, tsumoFu = isTsumo ? 2 : 0;
            let machi = parseInt(document.getElementById('machi').value);
            let jantou = parseInt(document.getElementById('jantou').value);
            let mentsuTotal = 0;
            document.querySelectorAll('.mentsu-select').forEach(sel => { mentsuTotal += parseInt(sel.value); });
            let rawFu = base + menzenRon + tsumoFu + machi + jantou + mentsuTotal;
            finalFu = Math.ceil(rawFu / 10) * 10;
            if (finalFu < 30) finalFu = 30;
            fuBreakdown = `20+${menzenRon}+${tsumoFu}+${machi}+${jantou}+${mentsuTotal} = ${rawFu}→${finalFu}符`;
        }

        if (activeYakuCount === 0) {
            document.getElementById('totalScore').innerText = "0 点";
            document.getElementById('scoreDetail').innerText = "役と手牌を選択してください";
            document.getElementById('rankName').innerText = "";
            document.getElementById('calcInfo').innerText = "";
            return;
        }

        let basicPoints = 0;
        let rank = "";

        if (han >= 13) { basicPoints = 8000; rank = "役満"; }
        else if (han >= 11) { basicPoints = 6000; rank = "三倍満"; }
        else if (han >= 8) { basicPoints = 4000; rank = "倍満"; }
        else if (han >= 6) { basicPoints = 3000; rank = "跳満"; }
        else {
            let tempBasic = finalFu * Math.pow(2, han + 2);
            if (han === 5 || (han === 4 && finalFu >= 40) || (han === 3 && finalFu >= 70) || tempBasic > 2000) {
                basicPoints = 2000; rank = "満貫";
            } else {
                basicPoints = tempBasic;
            }
        }

        if (rank !== "") {
            createSparkles();
        }

        const roundUp = (num) => Math.ceil(num / 100) * 100;
        let totalScore = 0, detail = "";

        if (isOya) {
            if (isTsumo) { const pay = roundUp(basicPoints * 2); totalScore = pay * 3; detail = `${pay} 点 オール`; }
            else { totalScore = roundUp(basicPoints * 6); detail = "ロンアガリ"; }
        } else {
            if (isTsumo) { const o = roundUp(basicPoints * 2), k = roundUp(basicPoints * 1); totalScore = o + (k * 2); detail = `親: ${o} / 子: ${k}`; }
            else { totalScore = roundUp(basicPoints * 4); detail = "ロンアガリ"; }
        }

        document.getElementById('totalScore').innerText = totalScore.toLocaleString() + " 点";
        document.getElementById('scoreDetail').innerText = detail;
        document.getElementById('rankName').innerText = rank;
        document.getElementById('calcInfo').innerText = `【${han}翻${tsumoYakuText} / ${finalFu}符】\n${fuBreakdown}`;
    }

    document.querySelectorAll('select, input, .yaku-cb').forEach(el => {
        el.addEventListener('change', calculateScore);
    });
    document.querySelectorAll('.fu-change').forEach(el => {
        el.addEventListener('change', calculateScore);
    });
</script>

</body>
</html>
